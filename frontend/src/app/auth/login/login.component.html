<div class="login-page">
  <div class="login-card">
    <div class="logo-container">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 6v6"/>
          <path d="M15 6v6"/>
          <path d="M2 12h19.6"/>
          <path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/>
          <circle cx="7" cy="18" r="2"/>
          <circle cx="15" cy="18" r="2"/>
        </svg>
      </div>
      <h1 class="title">Go Campus</h1>
      <p class="subtitle">Mobilidade Universitária</p>
    </div>

    <form (submit)="login($event)" class="login-form">
      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input
            type="email"
            id="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="seu@email.com"
            required
          >
        </div>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            id="senha"
            [(ngModel)]="credentials.senha"
            name="senha"
            placeholder="••••••••"
            required
          >
          <button type="button" class="toggle-password" (click)="togglePassword()">
            @if (showPassword()) {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>

    <div class="test-buttons">
      <p>Entrar como (Desenvolvimento):</p>
      <div class="test-buttons-row">
        <button type="button" (click)="fillTestUser('gestor')" class="btn-secondary">Gestor</button>
        <button type="button" (click)="fillTestUser('aluno')" class="btn-secondary">Aluno</button>
        <button type="button" (click)="fillTestUser('motorista')" class="btn-secondary">Motorista</button>
      </div>
    </div>

    <p class="register-link">Primeiro acesso? <a routerLink="/register">Cadastre-se</a></p>
  </div>
</div>
