<div class="register-page">
  <div class="register-card">
    <div class="header">
      <h1>Criar Conta de Gestor</h1>
      <p>Configure o primeiro usuário administrador do sistema</p>
    </div>

    <form (submit)="register($event)" class="register-form">
      @if (errorMessage()) {
        <div class="error-message">{{ errorMessage() }}</div>
      }

      @if (successMessage()) {
        <div class="success-message">{{ successMessage() }}</div>
      }

      <div class="form-section">
        <h3>Dados Pessoais</h3>

        <div class="input-group">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" [(ngModel)]="formData.nome" name="nome" placeholder="Seu nome completo" required>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" [(ngModel)]="formData.email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" (input)="formatCPF($event)" name="cpf" placeholder="000.000.000-00" required>
          </div>

          <div class="input-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" (input)="formatTelefone($event)" name="telefone" placeholder="(00) 00000-0000" required>
          </div>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" [(ngModel)]="formData.senha" name="senha" placeholder="Mínimo 6 caracteres" required>
        </div>
      </div>

      <div class="form-section">
        <h3>Endereço</h3>

        <div class="input-row">
          <div class="input-group">
            <label for="cep">CEP</label>
            <input type="text" id="cep" (input)="formatCEP($event)" name="cep" placeholder="00000-000">
          </div>
        </div>

        <div class="input-group">
          <label for="rua">Rua</label>
          <input type="text" id="rua" [(ngModel)]="formData.endereco.rua" name="rua" placeholder="Nome da rua">
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" [(ngModel)]="formData.endereco.bairro" name="bairro" placeholder="Bairro">
          </div>

          <div class="input-group">
            <label for="numero">Número</label>
            <input type="text" id="numero" [(ngModel)]="formData.endereco.numero" name="numero" placeholder="123">
          </div>
        </div>

        <div class="input-group">
          <label for="complemento">Complemento (opcional)</label>
          <input type="text" id="complemento" [(ngModel)]="formData.endereco.complemento" name="complemento" placeholder="Apto, bloco, etc">
        </div>

        <div class="input-group">
          <label for="tipoLocal">Tipo de Local</label>
          <select id="tipoLocal" [(ngModel)]="formData.endereco.tipoLocal" name="tipoLocal">
            <option value="RESIDENCIAL">Residencial</option>
            <option value="FACULDADE">Faculdade</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
          Criando conta...
        } @else {
          Criar conta de gestor
        }
      </button>

      <a routerLink="/login" class="back-link">Voltar para login</a>
    </form>
  </div>
</div>
