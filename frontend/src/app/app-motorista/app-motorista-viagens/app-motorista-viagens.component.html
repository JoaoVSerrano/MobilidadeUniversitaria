<div class="viagens">
  <h2>Minhas Viagens</h2>

  @for (viagem of viagens; track viagem.id) {
    <div class="viagem">
      <div class="viagem-header">
        <span class="viagem-rota">{{ viagem.rota }}</span>
        <span class="viagem-horario">{{ viagem.horario }}</span>
      </div>
      <div class="viagem-body">
        <span class="viagem-status" [class]="viagem.status.toLowerCase()">{{ viagem.status }}</span>
        <span class="viagem-passageiros">{{ viagem.passageiros }} passageiros ({{ viagem.ocupacao }}% ocupação)</span>
      </div>
    </div>
  }

  @if (viagens.length === 0) {
    <div class="empty-state">
      <p>Não há viagens agendadas.</p>
    </div>
  }
</div>
