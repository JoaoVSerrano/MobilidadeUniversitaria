<div class="app-motorista">
  <header class="header">
    <div class="header-info">
      <h2>Olá, {{ user()?.nome || 'Motorista' }} 👋</h2>
      <p>Go Campus — Painel do Motorista</p>
    </div>
    <button class="btn-logout" (click)="logout()" title="Sair">
      <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
    </button>
  </header>

  <main class="content">
    @switch (currentScreen) {
      @case ('dashboard') { <app-motorista-dashboard /> }
      @case ('viagens')   { <app-motorista-viagens />   }
      @case ('qr')        { <app-motorista-qr />        }
      @case ('notificacoes') { <app-motorista-notificacoes /> }
      @case ('perfil')    { <app-motorista-perfil />    }
    }
  </main>

  <nav class="bottom-nav">
    @for (item of navItems; track item.id) {
      <button class="nav-item" [class.active]="currentScreen === item.id" (click)="setScreen(item.id)">
        <span class="nav-icon">
          @switch (item.icon) {
            @case ('home') {
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
              </svg>
            }
            @case ('route') {
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
              </svg>
            }
            @case ('qr') {
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v2h2v2h-2v2h2v-2h2v2h2v-2h-2v-2h2v-2h-2v-2h-2v2zm0 4v2h-2v-2h2zm4 4v2h-2v-2h2z"/>
              </svg>
            }
            @case ('bell') {
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            }
            @case ('profile') {
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            }
          }
        </span>
        <span class="nav-label">{{ item.label }}</span>
      </button>
    }
  </nav>
</div>
