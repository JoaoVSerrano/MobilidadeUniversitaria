<div class="reserva">
  <h2>Reservar Viagem</h2>

  <form (ngSubmit)="reservar()">
    <div class="form-group">
      <label for="data">Data:</label>
      <input type="date" id="data" [(ngModel)]="dataSelecionada" name="data" required>
    </div>

    <div class="form-group">
      <label for="rota">Rota:</label>
      <select id="rota" [(ngModel)]="rotaSelecionada" name="rota" required>
        <option value="">Selecione uma rota</option>
        <option *ngFor="let rota of rotas" [value]="rota.id">
          {{ rota.nome }} ({{ rota.horario }}) - {{ rota.ocupacao }}% ocupação
        </option>
      </select>
    </div>

    <button type="submit" class="btn-primary">Confirmar Reserva</button>
  </form>
</div>
