<div class="app-aluno">
  <!-- Header -->
  <header class="header">
    <div class="header-info">
      <h2>Olá, {{ user()?.nome || 'Usuário' }}</h2>
      <p class="subtitle">Go Campus</p>
    </div>
    <button class="btn-logout" (click)="logout()" title="Sair">
      <span [innerHTML]="getIconSvg('logout')"></span>
    </button>
  </header>

  <!-- Content -->
  <main class="content">
    @switch (currentScreen) {
      @case ('dashboard') {
        <app-aluno-dashboard />
      }
      @case ('reserva') {
        <app-aluno-reserva />
      }
      @case ('qrcode') {
        <app-aluno-qrcode />
      }
      @case ('rastreamento') {
        <app-aluno-rastreamento />
      }
      @case ('perfil') {
        <app-aluno-perfil />
      }
    }
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    @for (item of navItems; track item.id) {
      <button
        class="nav-item"
        [class.active]="currentScreen === item.id"
        (click)="setScreen(item.id)">
        <span class="nav-icon" [innerHTML]="getIconSvg(item.icon)"></span>
        <span class="nav-label">{{ item.label }}</span>
      </button>
    }
  </nav>
</div>
