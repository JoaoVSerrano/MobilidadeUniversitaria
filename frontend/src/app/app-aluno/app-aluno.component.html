<div class="app-aluno">

  <header class="header">
    <div class="header-content">
      <div class="header-welcome">
        <h1 class="header-title">Olá, {{ userName() }} 👋</h1>
        <p class="header-subtitle">{{ getCurrentScreenDescription() }}</p>
      </div>
      <button class="btn-logout" (click)="logout()" title="Sair">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="content">
    @switch (currentScreen) {
      @case ('dashboard')    { <app-aluno-dashboard /> }
      @case ('reserva')      { <app-aluno-reserva />   }
      @case ('qrcode')       { <app-aluno-qrcode />    }
      @case ('rastreamento') { <app-aluno-rastreamento /> }
      @case ('notificacoes') { <app-aluno-notificacoes /> }
      @case ('perfil')       { <app-aluno-perfil />    }
    }
  </main>

  <nav class="bottom-nav">
    @for (item of navItems; track item.id) {
      <button
        class="nav-item"
        [class.active]="currentScreen === item.id"
        (click)="setScreen(item.id)">
        @switch (item.icon) {
          @case ('home') {
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
              </svg>
            </span>
          }
          @case ('calendar') {
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </span>
          }
          @case ('qr') {
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </span>
          }
          @case ('map') {
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"></polygon>
                <line x1="12" y1="12" x2="12" y2="12"></line>
              </svg>
            </span>
          }
          @case ('bell') {
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </span>
          }
          @case ('user') {
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
          }
        }
        <span class="nav-label">{{ item.label }}</span>
      </button>
    }
  </nav>

</div>
