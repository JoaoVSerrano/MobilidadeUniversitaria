<div class="qrcode-page">
  <h2 class="page-title">Carteirinha Digital</h2>

  @if (isLoading()) {
    <div class="loading">
      <div class="spinner"></div>
      <p>Carregando...</p>
    </div>
  } @else {
    <div class="digital-card">
      <!-- Avatar -->
      <div class="avatar-section">
        <div class="avatar">
          <span class="avatar-initials">{{ getIniciais() }}</span>
        </div>
        <button class="change-photo-btn">Alterar foto</button>
      </div>

      <!-- Info -->
      <div class="card-info">
        <h3 class="student-name">{{ user()?.nome || 'Nome do Aluno' }}</h3>
        <p class="student-matricula">Matrícula: {{ getMatricula() }}</p>
      </div>

      <!-- QR Code -->
      <div class="qr-section">
        <div class="qr-container">
          <img class="qr-code" [src]="qrDataUrl()" alt="QR Code da carteirinha" />
        </div>
        <div class="qr-text-box">
          <span class="qr-text-label">Código para digitação</span>
          <code class="qr-text">{{ user()?.id }}</code>
        </div>
        <div class="qr-status">
          <span class="status-indicator active"></span>
          <span class="status-text">Ativo</span>
        </div>
      </div>

      <!-- Update Button -->
      <button class="btn-update" (click)="atualizarQRCode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Atualizar QR Code
      </button>
    </div>
  }
</div>
