<header class="header-container">
  <!-- Left: Hamburger + Brand -->
  <div class="header-left">
    <button class="menu-toggle-btn" (click)="toggleSidebar.emit()" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <div class="brand">
      <div class="brand-avatar">G</div>
      <div class="brand-info">
        <span class="brand-name">Go Campus</span>
        <span class="brand-sub">Sistema de Transporte Universitário</span>
      </div>
    </div>
  </div>

  <!-- Centre: View Toggle Tabs -->
  <div class="view-tabs">
    <button class="view-tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      Dashboard Gestor
    </button>
    <button class="view-tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="8" y1="21" x2="16" y2="21"></line>
        <line x1="12" y1="17" x2="12" y2="21"></line>
      </svg>
      App Aluno
    </button>
    <button class="view-tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
        <path d="M6 18v2"></path><path d="M18 18v2"></path><path d="M2 10h20"></path>
      </svg>
      App Motorista
    </button>
  </div>

  <!-- Right: Search, Bell, Avatar -->
  <div class="header-right">
    <!-- Search -->
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" placeholder="Buscar rotas, veículos, motoristas..." class="search-input">
    </div>

    <!-- Notification -->
    <button class="icon-btn" aria-label="Notificações">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <span class="notification-badge"></span>
    </button>

    <!-- Avatar -->
    <div class="user-avatar">AG</div>
  </div>
</header>
