<header class="header-container">
  <!-- Left: Hamburger + Brand -->
  <div class="header-left">
    <button class="menu-toggle-btn" (click)="toggleSidebar.emit()" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <div class="brand">
      <div class="brand-avatar">G</div>
      <div class="brand-info">
        <span class="brand-name">Go Campus</span>
        <span class="brand-sub">Sistema de Transporte Universitário</span>
      </div>
    </div>
  </div>

  <!-- Centre: View Toggle Tabs (placeholder for future use) -->
  <div class="view-tabs">
  </div>

  <!-- Right: Search, Bell, Avatar -->
  <div class="header-right">
    <!-- Search -->
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" placeholder="Buscar rotas, veículos, motoristas..." class="search-input">
    </div>

    <!-- Notification -->
    <button class="icon-btn" aria-label="Notificações" (click)="onNotifications()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <span class="notification-badge"></span>
    </button>

    <!-- Avatar -->
    <div class="user-avatar" (click)="onProfile()">{{ userInitials }}</div>
  </div>
</header>

<!-- Profile Modal -->
@if (showProfileModal()) {
  <div class="modal-overlay" (click)="closeProfileModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Meu Perfil</h2>
        <button class="modal-close" (click)="closeProfileModal()">✕</button>
      </div>
      @if (user) {
        <div class="modal-body">
          <div class="profile-avatar">{{ userInitials }}</div>
          <div class="detail-row"><label>Nome</label><span>{{ user.nome }}</span></div>
          <div class="detail-row"><label>Email</label><span>{{ user.email }}</span></div>
          <div class="detail-row"><label>Tipo</label><span>{{ user.tipoUsuario }}</span></div>
          <div class="modal-actions">
            <button class="btn-logout" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Sair
            </button>
            <button class="btn-cancel" (click)="closeProfileModal()">Fechar</button>
          </div>
        </div>
      }
    </div>
  </div>
}
