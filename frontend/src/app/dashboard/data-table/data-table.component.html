<div class="table-container">
  <!-- Table Header -->
  <div class="table-header">
    <h3 class="table-title">Próximas Viagens</h3>
    <button class="table-action-btn">Ver todas</button>
  </div>

  <!-- Table Body / Responsive Wrapper -->
  <div class="table-responsive">
    <table class="data-table">
      <thead>
        <tr>
          <th>Rota</th>
          <th>Horário</th>
          <th>Motorista</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        @for (trip of trips; track trip.id) {
          <tr>
            <!-- Route Column -->
            <td class="route-cell">
              <div class="route-indicator">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </div>
              <span class="route-text">{{ trip.route }}</span>
            </td>
            <!-- Time Column -->
            <td class="time-cell">
              {{ trip.time }}
            </td>
            <!-- Driver Column -->
            <td class="driver-cell">
              <div class="driver-avatar">
                {{ trip.driver.split(' ')[0][0] }}{{ trip.driver.split(' ')[1]?.[0] || '' }}
              </div>
              <span class="driver-name">{{ trip.driver }}</span>
            </td>
            <!-- Status Column -->
            <td class="status-cell">
              <span [class]="'status-pill ' + trip.status">
                <span class="status-dot"></span>
                {{ getStatusLabel(trip.status) }}
              </span>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
