spring.application.name=mobilidadeUniversitaria

# Default: H2 file-based (persistent across restarts when not using --spring.profiles.active=prod)
spring.datasource.url=jdbc:h2:file:./data/gocampusdb;MODE=PostgreSQL;AUTO_RECONNECT=TRUE;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# PostgreSQL (activate with --spring.profiles.active=prod)


# H2 Console (dev only - disabled in prod)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# App Config
app.jwt.secret=mobilidade-universitaria-jwt-secret-dev-fixed
app.jwt.expiration-ms=86400000
app.qrcode.secret=mobilidade-universitaria-qrcode-secret-dev
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200,http://localhost:8081
app.upload.dir=${APP_UPLOAD_DIR:./uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Server port
server.port=${SERVER_PORT:8081}

# PostgreSQL (activate with --spring.profiles.active=prod)
---
spring.config.activate.on-profile=prod
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gocampus}
spring.datasource.username=${DB_USER:gocampus}
spring.datasource.password=${DB_PASSWORD:gocampus123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
