spring.application.name=mobilidadeUniversitaria

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:gocampusdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# App Config
app.jwt.secret=${JWT_SECRET:mobilidade-universitaria-jwt-secret-dev-precisa-trocar}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.qrcode.secret=${QRCODE_SECRET:mobilidade-universitaria-qrcode-secret-dev}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
app.upload.dir=${UPLOAD_DIR:/tmp/gocampus/uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Server port
server.port=8081
