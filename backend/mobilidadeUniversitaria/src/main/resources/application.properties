spring.application.name=mobilidadeUniversitaria
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1

app.jwt.secret=${JWT_SECRET:mobilidade-universitaria-jwt-secret-dev-precisa-trocar}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.qrcode.secret=${QRCODE_SECRET:mobilidade-universitaria-qrcode-secret-dev}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
